[pytest]
# ASTRA-v2 pytest configuration

# Test discovery
testpaths = UI/tests API/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Allure reporting
addopts =
    --alluredir=Data/allure-results
    --tb=short
    -q

# Playwright browser (override with --browser=firefox etc.)
# Default is chromium — see conftest.py for full browser options

# Custom markers
markers =
    ui: UI / browser-based tests
    api: API / HTTP tests
    e2e: End-to-end tests crossing UI and API
    autopilot: Tests generated by the A* autopilot runner
    shadow: Tests generated by shadow coding (playwright codegen)
    slow: Tests that take > 30 seconds
    smoke: Smoke test subset for quick pre-deploy verification
    regression: Full regression suite

# Log capturing
log_cli = true
log_cli_level = INFO
log_file = Data/logs/pytest.log
log_file_level = DEBUG

# Fail fast in CI if needed (override: pytest -x)
# -x is NOT set by default so all tests run

# Parallelism (install pytest-xdist: pip install pytest-xdist)
# Run with: pytest -n auto
