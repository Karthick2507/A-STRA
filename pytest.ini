[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -v
markers =
    ui: UI browser tests
    api: API tests
    e2e: End-to-end tests
    positive: Positive test cases
    negative: Negative test cases
asyncio_mode = auto
