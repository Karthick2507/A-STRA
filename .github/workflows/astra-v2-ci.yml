name: ASTRA-v2 CI

on:
  push:
    branches: ["main", "develop", "claude/**"]
    paths: ["ASTRA-v2/**"]
  pull_request:
    paths: ["ASTRA-v2/**"]
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options: [dev, staging, prod]
      suite:
        description: "Test suite marker"
        required: false
        default: "smoke"

env:
  PYTHON_VERSION: "3.11"
  ASTRA_ENV: ${{ github.event.inputs.env || 'staging' }}
  SUITE: ${{ github.event.inputs.suite || 'smoke' }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint & static checks (fast, no browser)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ASTRA-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --select E,F,W --ignore E501

  # ──────────────────────────────────────────────────────────────────────────
  # Unit tests (ML, feature extractor, healer — no browser needed)
  # ──────────────────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ASTRA-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short --no-header

  # ──────────────────────────────────────────────────────────────────────────
  # UI tests (Playwright)
  # ──────────────────────────────────────────────────────────────────────────
  ui-tests:
    name: UI Tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    defaults:
      run:
        working-directory: ASTRA-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI tests
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          pytest UI/tests -m "${{ env.SUITE }}" \
            --browser=${{ matrix.browser }} \
            --alluredir=Data/allure-results \
            -n auto --tb=short

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: ASTRA-v2/Data/allure-results

  # ──────────────────────────────────────────────────────────────────────────
  # API tests
  # ──────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [lint]

    defaults:
      run:
        working-directory: ASTRA-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        env:
          API_TOKEN:  ${{ secrets.API_TOKEN }}
          ASTRA_ENV:  ${{ env.ASTRA_ENV }}
        run: |
          pytest API/tests \
            --alluredir=Data/allure-results \
            -n auto --tb=short

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: ASTRA-v2/Data/allure-results

  # ──────────────────────────────────────────────────────────────────────────
  # Allure report publication
  # ──────────────────────────────────────────────────────────────────────────
  report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report:  allure-report
          gh_pages:       gh-pages
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  allure-report
